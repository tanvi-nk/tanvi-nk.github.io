<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research - Tanvi Kulkarni</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        /* Top Navigation Menu Bar */
        nav {
            margin-bottom: 40px;
            text-align: center;
            width: 100%;
        }

        nav a {
            color: #b0b3b8;
            text-decoration: none;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0 20px;
            padding-bottom: 6px;
            transition: all 0.3s ease;
            display: inline-block;
            font-weight: 500;
        }

        nav a.active {
            color: #00d2ff;
            border-bottom: 2px solid #00d2ff;
            text-shadow: 0 0 8px rgba(0, 210, 255, 0.6);
        }

        nav a:hover {
            color: #ffffff;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* Research Paper Wrapper */
        .paper-container {
            max-width: 850px;
            width: 100%;
            padding: 40px;
            border: 1px solid rgba(0, 210, 255, 0.15);
            background: rgba(10, 10, 12, 0.8);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            margin-bottom: 60px;
        }

        header.paper-header {
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 30px;
            margin-bottom: 35px;
        }

        h1.paper-title {
            font-size: 2.2rem;
            font-weight: 800;
            line-height: 1.3;
            background: linear-gradient(135deg, #ffffff 70%, #00d2ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
        }

        .author {
            font-size: 1.1rem;
            color: #00d2ff;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .references-meta {
            font-size: 0.85rem;
            color: #8a8d93;
            margin-top: 10px;
        }

        h2.section-heading {
            font-size: 1.3rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ffffff;
            margin-top: 40px;
            margin-bottom: 20px;
            border-left: 3px solid #00d2ff;
            padding-left: 15px;
        }

        h3.sub-section-heading {
            font-size: 1.1rem;
            color: #00d2ff;
            margin-top: 25px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        p {
            font-size: 1.05rem;
            line-height: 1.7;
            color: #cdd1d8;
            margin-bottom: 20px;
            text-align: justify;
        }

        blockquote.definition {
            background: rgba(0, 210, 255, 0.03);
            border: 1px solid rgba(0, 210, 255, 0.15);
            padding: 15px 20px;
            border-radius: 6px;
            margin: 20px 0;
            font-size: 1rem;
        }
        
        blockquote.definition strong {
            color: #00d2ff;
        }

        ul, ol {
            margin-left: 25px;
            margin-bottom: 20px;
            color: #cdd1d8;
        }

        li {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .chain-list {
            list-style-type: none;
            margin-left: 10px;
        }

        .chain-list li::before {
            content: "→ ";
            color: #00d2ff;
            font-weight: bold;
            margin-right: 5px;
        }

        .diagram-container {
            background: #0d0e12;
            border: 1px dashed rgba(0, 210, 255, 0.3);
            border-radius: 8px;
            padding: 25px;
            margin: 30px auto;
            text-align: center;
            max-width: 600px;
        }

        .diagram-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8a8d93;
            margin-bottom: 15px;
        }
